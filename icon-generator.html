<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Nida İkon Oluşturucu</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 24px;

      background: #f3f6f2;

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .card {
      width: 100%;
      max-width: 380px;

      padding: 24px;

      border-radius: 24px;

      background: white;

      text-align: center;

      box-shadow:
        0 18px 45px
        rgba(15, 61, 50, 0.12);
    }

    canvas {
      width: 190px;
      height: 190px;

      border-radius: 40px;

      box-shadow:
        0 12px 28px
        rgba(15, 61, 50, 0.20);
    }

    h1 {
      margin-bottom: 6px;

      color: #0f3d32;
    }

    p {
      color: #69756f;
    }

    button {
      width: 100%;

      margin-top: 12px;
      padding: 14px;

      border: 0;
      border-radius: 14px;

      background: #0f3d32;
      color: white;

      font-size: 16px;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>Nida</h1>

    <p>Uygulama ikonlarını oluştur.</p>

    <canvas
      id="preview"
      width="512"
      height="512"
    ></canvas>

    <button onclick="downloadIcon(192)">
      icon-192.png indir
    </button>

    <button onclick="downloadIcon(512)">
      icon-512.png indir
    </button>

  </div>

  <script>
    function drawRoundedRectangle(
      context,
      x,
      y,
      width,
      height,
      radius
    ) {
      context.beginPath();

      context.moveTo(
        x + radius,
        y
      );

      context.lineTo(
        x + width - radius,
        y
      );

      context.quadraticCurveTo(
        x + width,
        y,
        x + width,
        y + radius
      );

      context.lineTo(
        x + width,
        y + height - radius
      );

      context.quadraticCurveTo(
        x + width,
        y + height,
        x + width - radius,
        y + height
      );

      context.lineTo(
        x + radius,
        y + height
      );

      context.quadraticCurveTo(
        x,
        y + height,
        x,
        y + height - radius
      );

      context.lineTo(
        x,
        y + radius
      );

      context.quadraticCurveTo(
        x,
        y,
        x + radius,
        y
      );

      context.closePath();
    }

    function createIcon(size) {
      const canvas =
        document.createElement("canvas");

      canvas.width = size;
      canvas.height = size;

      const context =
        canvas.getContext("2d");

      const scale =
        size / 512;

      context.clearRect(
        0,
        0,
        size,
        size
      );

      drawRoundedRectangle(
        context,
        0,
        0,
        size,
        size,
        105 * scale
      );

      context.fillStyle =
        "#0f3d32";

      context.fill();

      const gradient =
        context.createLinearGradient(
          0,
          0,
          size,
          size
        );

      gradient.addColorStop(
        0,
        "rgba(255,255,255,0.10)"
      );

      gradient.addColorStop(
        1,
        "rgba(255,255,255,0)"
      );

      drawRoundedRectangle(
        context,
        0,
        0,
        size,
        size,
        105 * scale
      );

      context.fillStyle =
        gradient;

      context.fill();

      context.beginPath();

      context.arc(
        245 * scale,
        205 * scale,
        125 * scale,
        0,
        Math.PI * 2
      );

      context.fillStyle =
        "#d5a84b";

      context.fill();

      context.beginPath();

      context.arc(
        295 * scale,
        165 * scale,
        115 * scale,
        0,
        Math.PI * 2
      );

      context.fillStyle =
        "#0f3d32";

      context.fill();

      context.fillStyle =
        "#ffffff";

      context.font =
        `bold ${150 * scale}px Arial`;

      context.textAlign =
        "center";

      context.textBaseline =
        "middle";

      context.fillText(
        "N",
        size / 2,
        372 * scale
      );

      return canvas;
    }

    function showPreview() {
      const preview =
        document.getElementById(
          "preview"
        );

      const context =
        preview.getContext("2d");

      const icon =
        createIcon(512);

      context.clearRect(
        0,
        0,
        512,
        512
      );

      context.drawImage(
        icon,
        0,
        0
      );
    }

    function downloadIcon(size) {
      const canvas =
        createIcon(size);

      const link =
        document.createElement("a");

      link.download =
        `icon-${size}.png`;

      link.href =
        canvas.toDataURL(
          "image/png"
        );

      document.body.appendChild(
        link
      );

      link.click();
      link.remove();
    }

    showPreview();
  </script>

</body>
</html>
